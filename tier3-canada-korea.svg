<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="clip3">
      <circle cx="50" cy="50" r="49"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip3)">
    <!-- Left half: Canada (red field) -->
    <rect width="50" height="100" fill="#D52B1E"/>

    <!-- Right half: Korea (white field) -->
    <rect x="50" width="50" height="100" fill="#FFFFFF"/>

    <!-- White maple leaf on left half -->
    <g transform="translate(25, 50) scale(0.32)">
      <path d="M 0,-50 L 8,-25 L 30,-30 L 22,-15 L 50,-10 L 32,5 L 45,18 L 22,18 L 28,38 L 8,28 L 5,50 L 0,40 L -5,50 L -8,28 L -28,38 L -22,18 L -45,18 L -32,5 L -50,-10 L -22,-15 L -30,-30 L -8,-25 Z"
            fill="#FFFFFF"/>
    </g>

    <!-- Taegeuk on right half -->
    <g transform="translate(75, 50)">
      <!-- Red top -->
      <path d="M -18,0
               A 18,18 0 0,1 18,0
               A 9,9 0 0,0 0,0
               A 9,9 0 0,1 -18,0 Z"
            fill="#CD2E3A"/>
      <!-- Blue bottom -->
      <path d="M 18,0
               A 18,18 0 0,1 -18,0
               A 9,9 0 0,0 0,0
               A 9,9 0 0,1 18,0 Z"
            fill="#0047A0"/>
    </g>

    <!-- Subtle vertical divider -->
    <line x1="50" y1="0" x2="50" y2="100" stroke="#888888" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="#333333" stroke-width="2"/>
</svg>
