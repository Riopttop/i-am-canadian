    <rect x="75" width="25" height="100" fill="#D52B1E"/>

    <!-- Red maple leaf in center -->
    <g transform="translate(50, 50) scale(0.45)">
      <path d="M 0,-50 L 8,-25 L 30,-30 L 22,-15 L 50,-10 L 32,5 L 45,18 L 22,18 L 28,38 L 8,28 L 5,50 L 0,40 L -5,50 L -8,28 L -28,38 L -22,18 L -45,18 L -32,5 L -50,-10 L -22,-15 L -30,-30 L -8,-25 Z"
            fill="#D52B1E"/>
    </g>
  </g>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="#8B0000" stroke-width="2"/>
</svg>
