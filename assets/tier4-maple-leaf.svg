<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="clip4">
      <circle cx="50" cy="50" r="49"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip4)">
    <!-- White center band -->
    <rect width="100" height="100" fill="#FFFFFF"/>

